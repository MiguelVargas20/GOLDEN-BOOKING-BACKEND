spring.application.name=goldenbooking

# MongoDB - prefijo correcto
spring.mongodb.uri=mongodb://localhost:27017/goldenbooking
spring.mongodb.database=goldenbooking

# Puerto
server.port=8080

# Logs
logging.level.org.springframework=INFO
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb=INFO

# Mínimo 32 caracteres para HS256# ✅ Lee desde variable de entorno — nunca expone el valor real
miclavesecreta=${JWT_SECRET}

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.persistAuthorization=true

